<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d0d0f"/>
  <!-- Subtle accent border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#5e6ad2" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- <N/> logotype in monospace -->
  <text
    x="16"
    y="21.5"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    font-weight="700"
    letter-spacing="0.5"
  >
    <tspan fill="#5e6ad2">&lt;</tspan><tspan fill="#f2f2f7">N</tspan><tspan fill="#5e6ad2">/&gt;</tspan>
  </text>
</svg>
